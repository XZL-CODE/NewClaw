<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="'SF Pro Display','PingFang SC',-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <linearGradient id="core" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
    <linearGradient id="mem" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/></linearGradient>
    <linearGradient id="chan" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="tool" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#dc2626"/></linearGradient>
    <linearGradient id="perm" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="mission" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#ea580c"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#94a3b8"/></marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#10b981"/></marker>
  </defs>

  <rect width="960" height="720" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="800">NewClaw — Architecture Overview</text>
  <text x="480" y="56" text-anchor="middle" fill="#64748b" font-size="11">Event-Driven · Single-Thread Main Loop · Progressive Trust · Three-Layer Memory · Mission Engine</text>

  <!-- ===== Channels Row ===== -->
  <rect x="40" y="74" width="880" height="56" rx="10" fill="#1e3a5f" fill-opacity="0.5" stroke="#3b82f6" stroke-opacity="0.4"/>
  <text x="60" y="95" fill="#93c5fd" font-size="11" font-weight="700">CHANNELS</text>
  <rect x="150" y="84" width="90" height="36" rx="6" fill="url(#chan)" fill-opacity="0.8"/>
  <text x="195" y="106" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Terminal</text>
  <rect x="252" y="84" width="90" height="36" rx="6" fill="url(#chan)" fill-opacity="0.8"/>
  <text x="297" y="106" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Web GUI</text>
  <rect x="354" y="84" width="90" height="36" rx="6" fill="url(#chan)" fill-opacity="0.8"/>
  <text x="399" y="106" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Feishu</text>
  <rect x="456" y="84" width="90" height="36" rx="6" fill="url(#chan)" fill-opacity="0.8"/>
  <text x="501" y="106" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Telegram</text>
  <rect x="558" y="84" width="90" height="36" rx="6" fill="url(#chan)" fill-opacity="0.8"/>
  <text x="603" y="106" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Discord</text>
  <rect x="660" y="84" width="90" height="36" rx="6" fill="url(#chan)" fill-opacity="0.8"/>
  <text x="705" y="106" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Webhook</text>
  <rect x="762" y="84" width="140" height="36" rx="6" fill="url(#chan)" fill-opacity="0.5" stroke="#3b82f6" stroke-dasharray="4"/>
  <text x="832" y="106" text-anchor="middle" fill="#93c5fd" font-size="10">+ Custom Channel</text>

  <!-- Arrow: Channels → Event Collector -->
  <line x1="480" y1="130" x2="480" y2="156" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== Core Engine Box ===== -->
  <rect x="40" y="160" width="880" height="280" rx="10" fill="#1a1a2e" fill-opacity="0.6" stroke="#6366f1" stroke-opacity="0.4"/>
  <text x="60" y="182" fill="#a5b4fc" font-size="11" font-weight="700">CORE ENGINE — Single-Thread Main Loop</text>

  <!-- Event Collector -->
  <rect x="60" y="196" width="180" height="52" rx="8" fill="url(#core)" filter="url(#glow)"/>
  <text x="150" y="218" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Event Collector</text>
  <text x="150" y="234" text-anchor="middle" fill="#c7d2fe" font-size="9">waitForEvent · filter · queue</text>

  <!-- Context Assembler -->
  <rect x="270" y="196" width="180" height="52" rx="8" fill="url(#core)" filter="url(#glow)"/>
  <text x="360" y="218" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Context Assembler</text>
  <text x="360" y="234" text-anchor="middle" fill="#c7d2fe" font-size="9">identity · memory · task · tools</text>

  <!-- Model Reasoning -->
  <rect x="480" y="196" width="180" height="52" rx="8" fill="url(#core)" filter="url(#glow)"/>
  <text x="570" y="218" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Model Reasoning</text>
  <text x="570" y="234" text-anchor="middle" fill="#c7d2fe" font-size="9">stream · act · respond · silence</text>

  <!-- Action Executor -->
  <rect x="690" y="196" width="180" height="52" rx="8" fill="url(#core)" filter="url(#glow)"/>
  <text x="780" y="218" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Action Executor</text>
  <text x="780" y="234" text-anchor="middle" fill="#c7d2fe" font-size="9">parallel exec · permission check</text>

  <!-- Flow arrows -->
  <line x1="240" y1="222" x2="268" y2="222" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="222" x2="478" y2="222" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="660" y1="222" x2="688" y2="222" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Feedback loop arrow -->
  <path d="M 780 250 L 780 270 Q 780 280 770 280 L 160 280 Q 150 280 150 270 L 150 250" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arr)" stroke-dasharray="6"/>
  <text x="465" y="294" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="600">feedback loop: while (model produces tool_call) { execute → feed back }</text>

  <!-- Mission Engine -->
  <rect x="60" y="316" width="400" height="52" rx="8" fill="url(#mission)" fill-opacity="0.85"/>
  <text x="260" y="338" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Mission Engine — Autonomous Task Runner</text>
  <text x="260" y="354" text-anchor="middle" fill="#fed7aa" font-size="9">sprint/patrol modes · 30 loops/10min limit · auto-schedule · self-reflection</text>

  <!-- Permission Boundary -->
  <rect x="490" y="316" width="180" height="52" rx="8" fill="url(#perm)" fill-opacity="0.85"/>
  <text x="580" y="338" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Permission Boundary</text>
  <text x="580" y="354" text-anchor="middle" fill="#ddd6fe" font-size="9">L0 Free · L1 Notify · L2 Approve · L3 Forbidden</text>

  <!-- Task Queue -->
  <rect x="700" y="316" width="180" height="52" rx="8" fill="#334155" stroke="#64748b"/>
  <text x="790" y="338" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Task Queue</text>
  <text x="790" y="354" text-anchor="middle" fill="#94a3b8" font-size="9">max concurrency: 5</text>

  <!-- Silence decision -->
  <rect x="60" y="384" width="860" height="24" rx="4" fill="#0f172a" stroke="#334155"/>
  <text x="480" y="400" text-anchor="middle" fill="#64748b" font-size="10">silence decision = zero token consumption (no heartbeat, no polling — pure event-driven)</text>

  <!-- ===== Bottom Services Row ===== -->

  <!-- Memory Service -->
  <rect x="40" y="440" width="300" height="140" rx="10" fill="#064e3b" fill-opacity="0.4" stroke="#10b981" stroke-opacity="0.4"/>
  <text x="60" y="462" fill="#6ee7b7" font-size="11" font-weight="700">MEMORY SERVICE</text>
  <text x="60" y="480" fill="#a7f3d0" font-size="10">Three-Layer Architecture (Generative Agents)</text>
  <rect x="56" y="492" width="84" height="30" rx="5" fill="url(#mem)" fill-opacity="0.7"/>
  <text x="98" y="511" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">L1 Fact</text>
  <rect x="148" y="492" width="84" height="30" rx="5" fill="url(#mem)" fill-opacity="0.7"/>
  <text x="190" y="511" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">L2 Episode</text>
  <rect x="240" y="492" width="84" height="30" rx="5" fill="url(#mem)" fill-opacity="0.7"/>
  <text x="282" y="511" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">L3 Reflection</text>
  <text x="60" y="544" fill="#6ee7b7" font-size="9">Hybrid Retrieval: FTS5 (0.4) + TF-IDF (0.6)</text>
  <text x="60" y="558" fill="#6ee7b7" font-size="9">LLM-Driven Reflection · Auto-Compact · Per-User Isolation</text>
  <text x="60" y="572" fill="#6ee7b7" font-size="9">SQLite WAL · 64MB Cache</text>

  <!-- Tools -->
  <rect x="360" y="440" width="260" height="140" rx="10" fill="#451a1a" fill-opacity="0.4" stroke="#ef4444" stroke-opacity="0.4"/>
  <text x="380" y="462" fill="#fca5a5" font-size="11" font-weight="700">MINIMAL TOOLSET</text>
  <text x="380" y="480" fill="#fecaca" font-size="10">"Bash is everything" — CC Philosophy</text>
  <text x="380" y="500" fill="#fca5a5" font-size="10">bash · read_file · write_file · search_files</text>
  <text x="380" y="516" fill="#fca5a5" font-size="10">grep_content · web_search · web_fetch</text>
  <text x="380" y="532" fill="#fca5a5" font-size="10">send_message · memory_read · memory_write</text>
  <text x="380" y="548" fill="#fca5a5" font-size="10">set_timer · mission_* (9 tools)</text>
  <text x="380" y="568" fill="#f87171" font-size="9" font-weight="600">20 core tools — model uses bash for everything else</text>

  <!-- Extensions -->
  <rect x="640" y="440" width="280" height="140" rx="10" fill="#1e293b" fill-opacity="0.6" stroke="#64748b" stroke-opacity="0.4"/>
  <text x="660" y="462" fill="#cbd5e1" font-size="11" font-weight="700">EXTENSIONS</text>
  <rect x="656" y="476" width="120" height="30" rx="5" fill="#334155" stroke="#64748b"/>
  <text x="716" y="495" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600">MCP Protocol</text>
  <rect x="784" y="476" width="120" height="30" rx="5" fill="#334155" stroke="#64748b"/>
  <text x="844" y="495" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600">Plugin System</text>
  <text x="660" y="528" fill="#94a3b8" font-size="10">12 LLM Providers pre-configured:</text>
  <text x="660" y="544" fill="#94a3b8" font-size="9">Anthropic · OpenAI · DeepSeek · Moonshot</text>
  <text x="660" y="558" fill="#94a3b8" font-size="9">Dashscope · Zhipu · Gemini · Ollama</text>
  <text x="660" y="572" fill="#94a3b8" font-size="9">LM Studio · vLLM · OpenRouter · SiliconFlow</text>

  <!-- Arrow: Core → Memory -->
  <line x1="190" y1="440" x2="190" y2="438" stroke="#10b981" stroke-width="1" marker-end="url(#arrG)"/>

  <!-- ===== Formula Bar ===== -->
  <rect x="40" y="610" width="880" height="44" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="480" y="628" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="700">NewClaw = Claude Code Architecture + Autonomous AI Companion + Event-Driven + Progressive Trust</text>
  <text x="480" y="644" text-anchor="middle" fill="#64748b" font-size="10">"Design for the model six months from now — give it environment and tools, let it decide what to do."</text>

  <!-- ===== Footer Stats ===== -->
  <text x="480" y="690" text-anchor="middle" fill="#475569" font-size="10">TypeScript · 47 source files · 20 core tools · 12 LLM providers · 5 channels · SQLite · Zero external services</text>
  <text x="480" y="708" text-anchor="middle" fill="#334155" font-size="9">github.com/xzl-it/NewClaw</text>
</svg>
